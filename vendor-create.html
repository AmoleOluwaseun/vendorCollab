    <main class="nxl-container">
        <div class="nxl-content">
            <!-- [ page-header ] start -->
            <div class="page-header">
                <div class="page-header-left d-flex align-items-center">
                    <div class="page-header-title">
                        <h5 class="m-b-10">Create Vendor</h5>
                    </div>
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                        <li class="breadcrumb-item"><a href="vendors.html">Vendors</a></li>
                        <li class="breadcrumb-item">Create</li>
                    </ul>
                </div>
                <div class="page-header-right ms-auto">
                    <div class="page-header-right-items">
                        <div class="d-flex d-md-none">
                            <a href="javascript:void(0)" class="page-header-right-close-toggle">
                                <i class="feather-arrow-left me-2"></i>
                                <span>Back</span>
                            </a>
                        </div>
                        <div class="d-flex align-items-center gap-2 page-header-right-items-wrapper">
                            <a href="vendors.html" class="btn btn-light-brand">
                                <i class="feather-arrow-left me-2"></i>
                                <span>Back to Vendors</span>
                            </a>
                        </div>
                    </div>
                    <div class="d-md-none d-flex align-items-center">
                        <a href="javascript:void(0)" class="page-header-right-open-toggle">
                            <i class="feather-align-right fs-20"></i>
                        </a>
                    </div>
                </div>
            </div>
            <!-- [ page-header ] end -->
            <!-- [ Main Content ] start -->
            <div class="main-content">
                <div class="row">
                    <div class="col-lg-8 mx-auto">
                        <div class="card stretch stretch-full">
                            <div class="card-header">
                                <h5 class="card-title">Vendor Information</h5>
                                <p class="card-subtitle text-muted fs-12">Fill in the details below to add a new vendor to the platform.</p>
                            </div>
                            <div class="card-body">
                                <form action="vendors.html" class="w-100">
                                    <div class="row">
                                    <!-- Part 1: Company Profile -->
                                    <div class="mb-5">
                                        <h6 class="fw-bold text-primary mb-3">Part 1: Company Profile</h6>
                                        <div class="row">
                                            <div class="col-md-12 mb-4">
                                                <label class="form-label">Official Registered Company Name <span class="text-danger">*</span></label>
                                                <input type="text" class="form-control" placeholder="Enter registration name" required>
                                            </div>
                                            <div class="col-md-6 mb-4">
                                                <label class="form-label">Contact Person <span class="text-danger">*</span></label>
                                                <input type="text" class="form-control" placeholder="Full Name" required>
                                            </div>
                                            <div class="col-md-6 mb-4">
                                                <label class="form-label">Email Address <span class="text-danger">*</span></label>
                                                <input type="email" class="form-control" placeholder="business@email.com" required>
                                            </div>
                                            <div class="col-md-6 mb-4">
                                                <label class="form-label">Phone Number <span class="text-danger">*</span></label>
                                                <input type="tel" class="form-control" placeholder="e.g. +234 801 234 5678" required>
                                            </div>
                                            <div class="col-md-6 mb-4">
                                                <label class="form-label">Tax ID Number (TIN) <span class="text-danger">*</span></label>
                                                <input type="text" class="form-control" required>
                                            </div>
                                            <div class="col-md-6 mb-4">
                                                <label class="form-label">VAT Registered? <span class="text-danger">*</span></label>
                                                <select class="form-control" required>
                                                    <option value="yes">Yes</option>
                                                    <option value="no">No</option>
                                                </select>
                                            </div>
                                            <div class="col-md-6 mb-4">
                                                <label class="form-label">State <span class="text-danger">*</span></label>
                                                <select class="form-control" data-select2-selector="state" required>
                                                    <option value="" disabled selected>Select state</option>
                                                    <option value="abia">Abia</option>
                                                    <option value="adamawa">Adamawa</option>
                                                    <!-- ... states ... -->
                                                    <option value="lagos">Lagos</option>
                                                    <!-- ... other states ... -->
                                                </select>
                                            </div>
                                            <div class="col-12 mb-4">
                                                <label class="form-label">Business Address <span class="text-danger">*</span></label>
                                                <textarea class="form-control" rows="2" required></textarea>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Part 2: Directorate & Management -->
                                    <div class="mb-5">
                                        <h6 class="fw-bold text-primary mb-3">Part 2: Directorate & Management</h6>
                                        <div class="row">
                                            <div class="col-12 mb-4">
                                                <label class="form-label">Shareholders <span class="text-danger">*</span></label>
                                                <textarea class="form-control" rows="2" placeholder="List major shareholders" required></textarea>
                                            </div>
                                            <div class="col-12 mb-4">
                                                <label class="form-label">Company Directorate <span class="text-danger">*</span></label>
                                                <textarea class="form-control" rows="2" required></textarea>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Part 3: Products/Services -->
                                    <div class="mb-5">
                                        <h6 class="fw-bold text-primary mb-3">Part 3: Products/Services</h6>
                                        <div class="row">
                                            <div class="col-md-6 mb-4">
                                                <label class="form-label">Vendor Classification <span class="text-danger">*</span></label>
                                                <select class="form-control" required>
                                                    <option value="manufacturer">Manufacturer</option>
                                                    <option value="agent">Agent / Distributor</option>
                                                    <option value="trader">Trader</option>
                                                    <option value="service_provider">Service Provider</option>
                                                </select>
                                            </div>
                                            <div class="col-md-6 mb-4">
                                                <label class="form-label">Target Commodities <span class="text-danger">*</span></label>
                                                <input type="text" class="form-control" required>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Status -->
                                    <div class="mb-4">
                                        <h6 class="fw-bold text-primary mb-3">System Settings</h6>
                                        <div class="row">
                                            <div class="col-md-6">
                                                <label class="form-label">Account Status <span class="text-danger">*</span></label>
                                                <select class="form-control" required>
                                                    <option value="active" selected>Active</option>
                                                    <option value="inactive">Inactive</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>

                                    </div>
                                    <div class="d-flex justify-content-end gap-2 mt-4">
                                        <a href="vendors.html" class="btn btn-light-brand">Cancel</a>
                                        <button type="submit" class="btn btn-primary">
                                            <i class="feather-user-plus me-2"></i>
                                            <span>Create Vendor</span>
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- [ Main Content ] end -->
        </div>

                    document.write(new Date().getFullYear());
